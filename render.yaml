services:
  - type: web
    name: marketing-ai-api
    runtime: python
    rootDir: backend
    plan: free
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn main:app --host 0.0.0.0 --port $PORT
    healthCheckPath: /health
    envVars:
      - key: APP_ENV
        value: production
      - key: PYTHON_VERSION
        value: 3.11.11
      - key: AI_PROVIDER
        value: openai
      # Set these in the Render dashboard (never commit secrets):
      # OPENAI_API_KEY, ANTHROPIC_API_KEY, DATABASE_URL,
      # FIREBASE_PROJECT_ID, FIREBASE_CREDENTIALS_JSON,
      # CORS_ORIGINS or FRONTEND_URL
